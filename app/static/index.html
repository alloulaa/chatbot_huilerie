<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Huilerie - Prototype enrichi</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: rgba(255,255,255,.92);
      --ink: #102033;
      --muted: #637081;
      --accent: #1f5b39;
      --accent-soft: #e8f2ea;
      --line: #d9e1ea;
      --user: #dbeafe;
      --bot: #eef8f0;
    }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31,91,57,.10), transparent 35%),
        radial-gradient(circle at bottom right, rgba(31,91,57,.08), transparent 30%),
        var(--bg);
      margin:0;
      color: var(--ink);
    }
    .wrap { max-width: 1180px; margin: 22px auto; display:grid; grid-template-columns: 320px 1fr; gap:20px; padding: 0 16px; }
    .card { background:var(--card); backdrop-filter: blur(8px); border-radius:20px; padding:20px; box-shadow:0 18px 40px rgba(12,25,38,.08); border:1px solid rgba(255,255,255,.5); }
    h1 { margin:0 0 8px; font-size:28px; letter-spacing:-.03em; }
    .muted { color:var(--muted); font-size:14px; line-height:1.5; }
    #messages { height: 540px; overflow:auto; padding:14px; background:linear-gradient(180deg, rgba(248,250,252,.95), rgba(242,246,250,.88)); border-radius:16px; border:1px solid var(--line); }
    .msg { margin:10px 0; padding:12px 14px; border-radius:16px; max-width:80%; white-space:pre-wrap; box-shadow:0 8px 20px rgba(18,38,63,.06); }
    .user { background:var(--user); margin-left:auto; }
    .bot { background:var(--bot); }
    .meta { font-size:12px; color:var(--muted); margin-top:6px; }
    .row { display:flex; gap:10px; margin-top:12px; }
    input, select, button { border-radius:12px; border:1px solid var(--line); padding:11px 12px; font-size:14px; }
    input { flex:1; background:#fff; }
    button { background:var(--accent); color:#fff; cursor:pointer; border-color:transparent; }
    .quick button { width:100%; text-align:left; margin-bottom:8px; background:#fff; color:var(--ink); }
    .small { font-size:13px; }
    .badge { display:inline-block; padding:4px 8px; border-radius:999px; background:var(--accent-soft); font-size:12px; margin:3px 3px 0 0; color:var(--accent); }
    .choice-bar { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .choice-bar button { background:#fff; color:var(--accent); border:1px solid #bfd7c8; }
    .panel { margin-top:16px; padding:16px; border:1px solid var(--line); border-radius:16px; background:#fff; }
    .panel h3 { margin:0 0 8px; font-size:16px; }
    .panel .hint { color:var(--muted); font-size:13px; }
    .chart-wrap { position:relative; height:320px; }
    canvas { max-width:100%; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Chatbot Huilerie</h1>
      <div class="muted">Assistant métier pour l'huilerie : réponses claires, choix texte ou graphique, et visualisations à la demande.</div>
      <div style="margin-top:12px;">
        <label class="small">Utilisateur de test</label>
        <select id="userId">
          <option value="1">1 - Direction (global)</option>
          <option value="2">2 - Responsable Nour</option>
          <option value="3">3 - Maintenance Nour</option>
          <option value="4">4 - Qualité Sahel</option>
        </select>
      </div>
      <div style="margin-top:16px;" class="quick">
        <div class="small muted">Exemples rapides</div>
        <button onclick="fillQ('Quels sont les meilleurs fournisseurs pour cette semaine ?')">Fournisseurs</button>
        <button onclick="fillQ('Donne-moi le cycle de vie du lot LO07')">Cycle de lot</button>
        <button onclick="fillQ('Montre le stock actuel par variété')">Stock par variété</button>
        <button onclick="fillQ('Quelles campagnes sont disponibles ?')">Campagnes</button>
        <button onclick="fillQ('Montre les analyses laboratoire du lot LO07')">Analyses labo</button>
        <button onclick="fillQ('Affiche les mouvements de stock de cette semaine')">Mouvements stock</button>
      </div>
    </div>

    <div class="card">
      <div id="messages"></div>
      <div class="row">
        <input id="messageInput" placeholder="Posez une question métier..." />
        <button onclick="sendMessage()">Envoyer</button>
      </div>
      <div class="muted" style="margin-top:10px;">
        Suggestions : <span class="badge">production</span><span class="badge">stock</span><span class="badge">rendement</span><span class="badge">pannes</span><span class="badge">qualité</span><span class="badge">alertes</span><span class="badge">prédiction</span>
      </div>
      <div id="details" style="margin-top:16px;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script>
    const sessionId = 'web-demo-session';
    const messagesEl = document.getElementById('messages');
    const detailsEl = document.getElementById('details');
    let choicePayload = null;
    let chartInstance = null;

    function addMessage(text, sender, meta='') {
      const div = document.createElement('div');
      div.className = 'msg ' + sender;
      div.innerHTML = `<div>${text}</div>${meta ? `<div class="meta">${meta}</div>` : ''}`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    function addChoiceMessage(text, meta='') {
      const div = addMessage(text, 'bot', meta);
      const actions = document.createElement('div');
      actions.className = 'choice-bar';
      actions.innerHTML = `
        <button type="button" onclick="sendChoice('texte')">Texte</button>
        <button type="button" onclick="sendChoice('graphique')">Graphique</button>
      `;
      div.appendChild(actions);
      return div;
    }

    function fillQ(q) {
      document.getElementById('messageInput').value = q;
    }

    function clearDetails() {
      detailsEl.innerHTML = '';
      if (chartInstance) {
        chartInstance.destroy();
        chartInstance = null;
      }
    }

    function renderChart(chartType, rows) {
      clearDetails();
      const card = document.createElement('div');
      card.className = 'panel';
      card.innerHTML = `
        <h3>Visualisation</h3>
        <div class="hint">${chartType === 'pie' ? 'Répartition' : chartType === 'line' ? 'Évolution' : 'Comparaison'}</div>
        <div class="chart-wrap"><canvas id="chartCanvas"></canvas></div>
      `;
      detailsEl.appendChild(card);

      const ctx = document.getElementById('chartCanvas');
      const labels = (rows || []).map(item => item.label);
      const values = (rows || []).map(item => Number(item.value) || 0);
      chartInstance = new Chart(ctx, {
        type: chartType || 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Résultats',
            data: values,
            backgroundColor: ['#1f5b39', '#4f7c62', '#7fa68d', '#aec6b4', '#cfe0d6'],
            borderColor: '#1f5b39',
            borderWidth: 1,
            tension: 0.35,
            fill: chartType === 'line'
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: chartType !== 'pie' } },
          scales: chartType === 'pie' ? {} : { y: { beginAtZero: true } }
        }
      });
    }

    function renderChoice(data) {
      choicePayload = data;
      clearDetails();
      const card = document.createElement('div');
      card.className = 'panel';
      card.innerHTML = `
        <h3>Affichage disponible</h3>
        <div class="hint">Choisissez comment afficher ces résultats.</div>
      `;
      detailsEl.appendChild(card);
    }

    async function sendChoice(choice) {
      if (!choicePayload) return;
      document.getElementById('messageInput').value = choice;
      await sendMessage(choice);
    }

    async function sendMessage(forceMessage = null) {
      const input = document.getElementById('messageInput');
      const message = (forceMessage || input.value).trim();
      if (!message) return;
      const userId = Number(document.getElementById('userId').value);
      addMessage(message, 'user');
      input.value = '';

      const res = await fetch('/chat/ask', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ message, user_id: userId, session_id: sessionId })
      });
      const data = await res.json();
      const responseType = data.type || 'text';
      const text = data.message || data.response || 'Réponse indisponible.';
      if (responseType === 'choice') {
        addChoiceMessage(text, `Intent: ${data.intent} | Confiance: ${data.confidence}`);
      } else {
        addMessage(text, 'bot', `Intent: ${data.intent} | Confiance: ${data.confidence}`);
      }

      if (responseType === 'choice') {
        renderChoice(data.data || []);
      } else if (responseType === 'chart') {
        renderChart(data.chart_type || 'bar', data.data || []);
      } else {
        clearDetails();
      }

      choicePayload = responseType === 'choice' ? (data.data || []) : null;
    }

    addMessage("Bonjour. Je suis prêt à répondre sur la production, le stock, la qualité, les machines, les alertes et les prédictions simples.", 'bot');
  </script>
</body>
</html>
